<script>
        function selectMealCount(element, count) {
            // Remove active classes from all chips
            document.querySelectorAll('.meal-chip').forEach(chip => {
                chip.classList.remove('active', 'border-primary-container', 'bg-primary-container');
                chip.classList.add('border-outline-variant', 'bg-surface-container-low');
                
                // Reset text colors within chip
                const labels = chip.querySelectorAll('span');
                labels[0].classList.remove('text-on-primary-container');
                labels[1].classList.remove('text-on-primary-container');
                labels[1].classList.add('text-on-surface-variant');
            });

            // Set active state for clicked chip
            element.classList.add('active', 'border-primary-container', 'bg-primary-container');
            element.classList.remove('border-outline-variant', 'bg-surface-container-low');
            
            const labels = element.querySelectorAll('span');
            labels[0].classList.add('text-on-primary-container');
            labels[1].classList.add('text-on-primary-container');
            labels[1].classList.remove('text-on-surface-variant');
        }

        function updateFrequency(element, type) {
            const container = element.parentElement;
            const buttons = container.querySelectorAll('button');
            
            buttons.forEach(btn => {
                btn.classList.remove('bg-primary-container', 'text-on-primary-container');
                btn.classList.add('text-on-surface-variant', 'hover:text-primary');
            });

            element.classList.add('bg-primary-container', 'text-on-primary-container');
            element.classList.remove('text-on-surface-variant', 'hover:text-primary');
        }
    </script>
