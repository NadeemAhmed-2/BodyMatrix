<!-- Login Form -->
<form class="space-y-stack-md" onsubmit="event.preventDefault();">
<!-- Email Input -->

<input class="w-full bg-transparent border-none focus:ring-0 text-primary font-label-sm text-label-sm placeholder:text-surface-variant uppercase tracking-wider" placeholder="ATHLETE@FUELFLOW.COM" required="" type="email">
</div>
</div>
<!-- Password Input -->

<div class="flex items-center gap-base pb-stack-sm">
<span class="material-symbols-outlined text-on-surface-variant group-focus-within:text-primary-fixed text-[20px]">lock</span>

<button class="text-on-surface-variant hover:text-primary-fixed transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>

<label class="flex items-center gap-2 cursor-pointer group">

<!-- Ambient Micro-interactions Script -->
<script>
    document.addEventListener('mousemove', (e) => {
      const vignette = document.querySelector('.vignette');
      const xAxis = (window.innerWidth / 2 - e.pageX) / 45;
      const yAxis = (window.innerHeight / 2 - e.pageY) / 45;
      vignette.style.transform = `translate(${xAxis}px, ${yAxis}px)`;
    });

    // Ripple effect on button click
    const buttons = document.querySelectorAll('button');
    buttons.forEach(btn => {
      btn.addEventListener('click', function(e) {
        let x = e.clientX - e.target.offsetLeft;
        let y = e.clientY - e.target.offsetTop;
        let ripples = document.createElement('span');
        ripples.style.left = x + 'px';
        ripples.style.top = y + 'px';
        ripples.classList.add('ripple');
        this.appendChild(ripples);
        setTimeout(() => { ripples.remove() }, 1000);
      });
    });
  </script>
<style>
    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }
    .ripple {
      position: absolute;
      background: white;
      transform: translate(-50%, -50%);
      pointer-events: none;
      border-radius: 50%;
      animation: ripple 0.6s linear;
      opacity: 0.3;
    }
  </style>
