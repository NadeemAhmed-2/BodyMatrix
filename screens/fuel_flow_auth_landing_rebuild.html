<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Subtle haptic response simulation
        const links = document.querySelectorAll('a');
        links.forEach(link => {
            link.addEventListener('click', () => {
                if ('vibrate' in navigator) {
                    navigator.vibrate(15);
                }
            });
        });
    });
